#RBAC:

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: dev-role
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["get", "create", "delete", "edit" ,"list"]
- apiGroups: [""] # "" indicates the core API group
  resources: ["configMap"]
  verbs: ["create"]
  resourceNames: ["blue", "orange"]


