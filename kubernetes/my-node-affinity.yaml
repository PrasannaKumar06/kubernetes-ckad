#             operator: In
#             values:
#             - Large
#             - Medium

# if we want the pod to run in any node which is not small
# - matchExpressions:
#           - key: size
#             operator: NotIn
#             values:
#             - Small   

# if the label is there in the node then it will assingn the pod
# - matchExpressions:
#           - key: size
#             operator: Exists  